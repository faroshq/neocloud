apiVersion: compute.cloud.platform/v1alpha1
kind: PublicCloudInit
metadata:
  name: debian
spec:
  displayName: Debian / Ubuntu Default
  description: Default cloud-init for Debian-based distributions. Installs openssh-server and configures SSH access.
  userData: |
    #cloud-config
    hostname: {{.Hostname}}
    bootcmd:
      - sed -i '/\/boot\/efi/s/^/#/' /etc/fstab
      - systemctl mask boot-efi.mount || true
    packages:
      - openssh-server
    {{- if .EnableRootLogin}}
    ssh_pwauth: true
    disable_root: false
    chpasswd:
      users:
        - name: root
          password: {{.RootPassword}}
          type: text
      expire: false
    write_files:
      - path: /etc/ssh/sshd_config.d/99-permit-root.conf
        content: |
          PermitRootLogin yes
        permissions: '0644'
    runcmd:
      - systemctl enable ssh || systemctl enable sshd || true
      - systemctl restart ssh || systemctl restart sshd || true
      {{- if .SSHPublicKey}}
      - mkdir -p /root/.ssh && chmod 700 /root/.ssh
      - echo "{{.SSHPublicKey}}" >> /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys
      {{- end}}
    {{- end}}
    {{- if .SSHPublicKey}}
    ssh_authorized_keys:
      - {{.SSHPublicKey}}
    {{- end}}
  os: linux
  category: debian
  tags:
    - debian
    - ubuntu
    - debian-based
    - default
