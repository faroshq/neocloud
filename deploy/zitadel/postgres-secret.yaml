# =============================================================================
# PostgreSQL Credentials Secret (Template)
# =============================================================================
#
# This is a TEMPLATE secret. Before applying, replace the placeholder password
# with a securely generated value.
#
# Generate a strong password:
#   openssl rand -base64 24
#
# Then either:
#   1. Replace the placeholder below and apply:
#        kubectl apply -f deploy/zitadel/postgres-secret.yaml
#
#   2. Or create the secret imperatively:
#        kubectl create secret generic postgres-credentials \
#          --namespace=zitadel \
#          --from-literal=POSTGRES_USER=zitadel \
#          --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 24) \
#          --from-literal=POSTGRES_DB=zitadel
#
# IMPORTANT: Do NOT commit this file with real credentials to version control.
#            Use a secrets manager (Vault, Sealed Secrets, SOPS) in production.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: zitadel
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: zitadel
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # POSTGRES_USER: The database superuser name. Zitadel uses this to connect.
  POSTGRES_USER: "zitadel"

  # POSTGRES_PASSWORD: Replace this placeholder with a strong random password.
  # Generate with: openssl rand -base64 24
  POSTGRES_PASSWORD: "CHANGE_ME_GENERATE_WITH_openssl_rand_-base64_24"

  # POSTGRES_DB: The database name that Zitadel will use.
  POSTGRES_DB: "zitadel"
