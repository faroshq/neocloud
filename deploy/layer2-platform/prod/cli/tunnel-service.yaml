# =============================================================================
# SSH Tunnel Service - Deployment & Service
# =============================================================================
# The tunnel service provides a gRPC-based SSH tunnel that allows the
# sovereign cloud CLI to securely connect to kcp workspaces. It acts as a
# bridge between CLI clients and the kcp API server / workload clusters.
#
# The service requires:
#   - A kubeconfig for the kcp API server (mounted as a volume)
#   - A kubeconfig for workload clusters (mounted as a volume)
#   - Zitadel issuer URL for token validation
#
# Prerequisites:
#   - deploy/console/namespace.yaml (uses the "platform" namespace)
#   - Secrets "kcp-kubeconfig" and "workload-kubeconfig" containing the
#     respective kubeconfig files
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tunnel-service
  namespace: platform
  labels:
    app.kubernetes.io/name: tunnel-service
    app.kubernetes.io/component: cli-tunnel
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tunnel-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tunnel-service
        app.kubernetes.io/component: cli-tunnel
        app.kubernetes.io/part-of: sovereign-cloud-platform
    spec:
      # Run as non-root for security (required by restricted PSS)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tunnel-service
          image: ghcr.io/faroshq/tunnel-service:latest
          ports:
            - name: grpc
              containerPort: 8443
              protocol: TCP
          # ---------------------------------------------------------------
          # Command-line arguments for the tunnel service
          # ---------------------------------------------------------------
          args:
            - --kcp-kubeconfig=/etc/tunnel/kcp/kubeconfig
            - --workload-kubeconfig=/etc/tunnel/workload/kubeconfig
            - --zitadel-issuer=https://auth.demo.example.com
          # ---------------------------------------------------------------
          # Volume mounts for kubeconfig files
          # ---------------------------------------------------------------
          volumeMounts:
            - name: kcp-kubeconfig
              mountPath: /etc/tunnel/kcp
              readOnly: true
            - name: workload-kubeconfig
              mountPath: /etc/tunnel/workload
              readOnly: true
          # ---------------------------------------------------------------
          # Resource requests and limits
          # ---------------------------------------------------------------
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 256Mi
          # ---------------------------------------------------------------
          # Health checks - gRPC health check on the same port
          # ---------------------------------------------------------------
          livenessProbe:
            grpc:
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          # Security context for the container (restricted PSS compliance)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      # -------------------------------------------------------------------
      # Volumes - kubeconfig secrets
      # -------------------------------------------------------------------
      volumes:
        - name: kcp-kubeconfig
          secret:
            secretName: kcp-kubeconfig
            # Ensure the secret file is readable
            defaultMode: 0400
        - name: workload-kubeconfig
          secret:
            secretName: workload-kubeconfig
            defaultMode: 0400
      # Spread replicas across nodes for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: tunnel-service
---
# =============================================================================
# Tunnel Service - Service
# =============================================================================
# ClusterIP service exposing the gRPC tunnel endpoint. External access is
# handled via the Gateway API route (see tunnel-httproute.yaml).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: tunnel-service
  namespace: platform
  labels:
    app.kubernetes.io/name: tunnel-service
    app.kubernetes.io/component: cli-tunnel
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tunnel-service
  ports:
    - name: grpc
      port: 8443
      targetPort: 8443
      protocol: TCP
