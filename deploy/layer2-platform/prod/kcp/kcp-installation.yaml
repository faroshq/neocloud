# =============================================================================
# KCP Installation via kcp-operator
# =============================================================================
#
# This manifest defines the core KCP control plane components:
#   1. RootShard    - The primary shard running the KCP API server + embedded
#                     cache server. Stores workspace metadata in etcd.
#   2. FrontProxy   - A reverse proxy that routes requests to the correct
#                     shard. Provides the stable external API endpoint.
#   3. Kubeconfig   - An admin kubeconfig resource that targets the front-proxy
#                     endpoint, used for initial cluster bootstrapping.
#
# Prerequisites:
#   - kcp-operator installed (helm install kcp-operator kcp/kcp-operator)
#   - cert-manager installed (for TLS certificate provisioning)
#   - Zitadel OIDC provider deployed and configured
#   - Namespace created for KCP resources
#
# Reference: https://github.com/kcp-dev/kcp/tree/main/contrib/production/kcp-vespucci
#
# Apply with:
#   kubectl apply -f kcp-installation.yaml
# =============================================================================

---
# -----------------------------------------------------------------------------
# Namespace for KCP resources
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: kcp-system
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    app.kubernetes.io/component: kcp

---
# -----------------------------------------------------------------------------
# cert-manager: Self-signed CA for KCP internal TLS
# -----------------------------------------------------------------------------
# Creates a self-signed issuer, a CA certificate, and an issuer backed by
# that CA. The RootShard references this issuer to get its serving certs.
# For production with real DNS, replace with a Let's Encrypt ClusterIssuer.
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kcp-selfsigned
  namespace: kcp-system
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kcp-ca
  namespace: kcp-system
spec:
  isCA: true
  commonName: kcp-ca
  secretName: kcp-ca-tls
  issuerRef:
    name: kcp-selfsigned
    kind: Issuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: kcp-ca
  namespace: kcp-system
spec:
  ca:
    secretName: kcp-ca-tls

---
# -----------------------------------------------------------------------------
# RootShard
# -----------------------------------------------------------------------------
# The RootShard is the foundational shard in a KCP deployment. It holds the
# root workspace and all top-level workspace metadata.
#
# Key configuration:
#   - external.hostname/port: The endpoint where clients reach this shard.
#   - cache.embedded: Runs the cache server in-process.
#   - auth.oidc: Configures OpenID Connect authentication against Zitadel.
#   - etcd: Connection to etcd cluster (managed by etcd-druid or external).
#     For dev, use embedded etcd via the kcp-operator's default behavior.
#   - certificates.issuerRef: cert-manager issuer for TLS certificates.
# -----------------------------------------------------------------------------
apiVersion: operator.kcp.io/v1alpha1
kind: RootShard
metadata:
  name: root
  namespace: kcp-system
spec:
  # ---------------------------------------------------------------------------
  # External endpoint configuration
  # ---------------------------------------------------------------------------
  external:
    # hostname: The DNS name that clients and other shards use to reach this
    # shard. Must resolve to the front-proxy or a load balancer in front of it.
    # TODO: Replace with your KCP API domain.
    hostname: kcp.demo.example.com
    # port: The TLS port for the KCP API server on this shard.
    port: 6443

  # ---------------------------------------------------------------------------
  # Shard base URL — how other shards and the front-proxy reach this shard.
  # For single-shard deployments, this can be the in-cluster Service URL.
  # ---------------------------------------------------------------------------
  # TODO: Replace with your shard's reachable URL.
  shardBaseURL: https://kcp.demo.example.com:6443

  # ---------------------------------------------------------------------------
  # TLS certificates
  # ---------------------------------------------------------------------------
  certificates:
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: kcp-ca

  # ---------------------------------------------------------------------------
  # Authentication
  # ---------------------------------------------------------------------------
  auth:
    serviceAccount:
      enabled: true
    oidc:
      # TODO: Replace with your Zitadel domain.
      issuerURL: "https://auth.demo.example.com"
      clientID: "kcp"
      usernameClaim: "email"
      usernamePrefix: "oidc:"
      groupsClaim: "groups"
      groupsPrefix: "oidc:"
      # TODO: For self-signed OIDC issuers, set caFileRef to a secret
      # containing the issuer's CA certificate.
      # caFileRef:
      #   name: zitadel-ca-bundle
      #   key: ca.crt

  # ---------------------------------------------------------------------------
  # Embedded cache server
  # ---------------------------------------------------------------------------
  cache:
    embedded:
      enabled: true

  # ---------------------------------------------------------------------------
  # etcd configuration
  # ---------------------------------------------------------------------------
  # Required. Points to the etcd cluster used by this shard.
  # For production, use etcd-druid with TLS:
  #   etcd:
  #     endpoints:
  #       - https://root-client.kcp-system.svc.cluster.local:2379
  #     tlsConfig:
  #       secretRef:
  #         name: etcd-ca-tls
  #
  # For dev, a single-node etcd without TLS:
  # TODO: Replace with your etcd endpoints.
  etcd:
    endpoints:
      - http://kcp-etcd-0.kcp-etcd.kcp-system.svc.cluster.local:2379

---
# -----------------------------------------------------------------------------
# FrontProxy
# -----------------------------------------------------------------------------
# The FrontProxy is the externally-facing component of a KCP deployment.
# All client traffic enters through the front-proxy, which routes requests
# to the correct shard based on the workspace/cluster path.
# -----------------------------------------------------------------------------
apiVersion: operator.kcp.io/v1alpha1
kind: FrontProxy
metadata:
  name: frontproxy
  namespace: kcp-system
spec:
  # ---------------------------------------------------------------------------
  # External endpoint — must match the DNS name clients use.
  # ---------------------------------------------------------------------------
  external:
    # TODO: Replace with your KCP API domain.
    hostname: kcp.demo.example.com
    port: 6443

  # ---------------------------------------------------------------------------
  # Root shard reference
  # ---------------------------------------------------------------------------
  rootShard:
    ref:
      name: root

  # ---------------------------------------------------------------------------
  # Authentication — must match the RootShard auth config.
  # ---------------------------------------------------------------------------
  auth:
    serviceAccount:
      enabled: true
    oidc:
      # TODO: Replace with your Zitadel domain.
      issuerURL: "https://auth.demo.example.com"
      clientID: "kcp"
      usernameClaim: "email"
      usernamePrefix: "oidc:"
      groupsClaim: "groups"
      groupsPrefix: "oidc:"
      # TODO: For self-signed OIDC issuers, set caFileRef to a secret
      # containing the issuer's CA certificate.
      # caFileRef:
      #   name: zitadel-ca-bundle
      #   key: ca.crt

---
# -----------------------------------------------------------------------------
# Kubeconfig
# -----------------------------------------------------------------------------
# Generates an admin kubeconfig stored in a Kubernetes Secret. This kubeconfig
# grants admin access to the KCP API through the front-proxy endpoint.
#
# Usage:
#   kubectl -n kcp-system get secret kcp-admin-kubeconfig \
#     -o jsonpath='{.data.kubeconfig}' | base64 -d > kcp-admin.kubeconfig
#   export KUBECONFIG=kcp-admin.kubeconfig
#   kubectl ws tree
#
# Security: This has full admin privileges. Rotate regularly.
# For day-to-day operations, use OIDC-based authentication instead.
# -----------------------------------------------------------------------------
apiVersion: operator.kcp.io/v1alpha1
kind: Kubeconfig
metadata:
  name: kcp-admin-kubeconfig
  namespace: kcp-system
spec:
  username: kcp-admin
  groups:
    - system:kcp:admin
  validity: 8766h # 1 year
  secretRef:
    name: kcp-admin-kubeconfig
  target:
    frontProxyRef:
      name: frontproxy
