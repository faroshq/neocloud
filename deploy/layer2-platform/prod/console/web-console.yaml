# =============================================================================
# Web Console - Deployment & Service
# =============================================================================
# The web console provides a browser-based UI for managing workspaces, viewing
# billing/usage data, and interacting with the kcp API server. It is a
# single-page application served by a lightweight Node.js container.
#
# Configuration is injected via:
#   - ConfigMap "console-config" for non-sensitive values (API URLs, issuer)
#   - Secret "console-secrets" for sensitive values (client IDs, keys)
#
# Prerequisites:
#   - deploy/console/namespace.yaml
#   - deploy/console/console-config.yaml
#   - A Secret named "console-secrets" with ZITADEL_CLIENT_ID and
#     STRIPE_PUBLISHABLE_KEY (create manually or via sealed-secrets)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-console
  namespace: platform
  labels:
    app.kubernetes.io/name: web-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-console
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: sovereign-cloud-platform
    spec:
      # Run as non-root for security (required by restricted PSS)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-console
          image: ghcr.io/faroshq/web-console:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          # ---------------------------------------------------------------
          # Environment variables sourced from ConfigMap and Secret
          # ---------------------------------------------------------------
          env:
            # --- From ConfigMap (non-sensitive) ---
            - name: KCP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: console-config
                  key: KCP_API_URL
            - name: ZITADEL_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: console-config
                  key: ZITADEL_ISSUER
            - name: OPENMETER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: console-config
                  key: OPENMETER_API_URL
            # --- From Secret (sensitive) ---
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: console-secrets
                  key: ZITADEL_CLIENT_ID
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: console-secrets
                  key: STRIPE_PUBLISHABLE_KEY
          # ---------------------------------------------------------------
          # Resource requests and limits
          # ---------------------------------------------------------------
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          # ---------------------------------------------------------------
          # Health checks
          # ---------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          # Security context for the container (restricted PSS compliance)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      # Spread replicas across nodes for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: web-console
---
# =============================================================================
# Web Console - Service
# =============================================================================
# ClusterIP service exposing the web console internally. External access is
# handled via the Gateway API HTTPRoute (see console-httproute.yaml).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: web-console
  namespace: platform
  labels:
    app.kubernetes.io/name: web-console
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web-console
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
