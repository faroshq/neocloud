# Demo VirtualMachine for Kind clusters.
#
# Uses a containerDisk (no CDI/PVC/storage required) with a minimal
# Alpine-based cloud image. Boots in ~30 seconds with software emulation.
#
# Usage:
#   kubectl apply -f deploy/kubevirt/demo-vm.yaml
#   kubectl wait vm/demo-vm --for=condition=Ready --timeout=120s
#   virtctl console demo-vm          # serial console (login: root, no password)
#   virtctl ssh demo-vm              # if SSH is configured in cloud-init
#
# Requires: KubeVirt with useEmulation: true (kubevirt-cr-kind.yaml)
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: demo-vm
  labels:
    app: demo
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: demo
        kubevirt.io/vm: demo-vm
    spec:
      domain:
        resources:
          requests:
            memory: 256Mi
            cpu: "1"
          limits:
            memory: 512Mi
            cpu: "1"
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            # Minimal Alpine-based cloud image (~50MB pull).
            # Alternatives:
            #   quay.io/kubevirt/fedora-cloud-container-disk-demo  (~300MB, full Fedora)
            #   quay.io/kubevirt/cirros-container-disk-demo        (~15MB, CirrOS)
            image: quay.io/kubevirt/alpine-container-disk-demo
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: demo-vm
              ssh_pwauth: true
              disable_root: false
              chpasswd:
                list: |
                  root:demo
                expire: false
