---
# -----------------------------------------------------------------------------
# Wildcard Tenant Certificate
# -----------------------------------------------------------------------------
# This wildcard certificate covers all tenant subdomains. Wildcard certificates
# require DNS-01 validation (HTTP-01 cannot be used for wildcards).
#
# IMPORTANT: If using HTTP-01 solver only, you must switch to a DNS-01 solver
# for this certificate. See cert-manager documentation for configuring DNS-01
# with your DNS provider (e.g., Cloudflare, Route53, Google Cloud DNS).
#
# Example DNS-01 solver override (uncomment and configure):
#   issuerRef:
#     name: letsencrypt-prod-dns01
#     kind: ClusterIssuer
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tenant-wildcard-tls
  namespace: platform
  labels:
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  secretName: tenant-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    # Wildcard for all tenant subdomains
    - "*.tenant.demo.example.com"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
