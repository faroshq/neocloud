# =============================================================================
# Platform TLS Certificates
# =============================================================================
# cert-manager Certificate resources for all platform services. Each
# Certificate creates a TLS Secret that can be referenced by Gateway
# listeners, Ingress resources, or application pods.
#
# All certificates use the letsencrypt-prod ClusterIssuer. For testing,
# change the issuerRef.name to "letsencrypt-staging" on each Certificate.
#
# Prerequisites:
#   - cert-manager installed in the cluster
#   - letsencrypt-prod ClusterIssuer (see letsencrypt-issuer.yaml)
#   - DNS records pointing to the cluster (see dns-records.yaml)
# =============================================================================

# -----------------------------------------------------------------------------
# kcp API Server Certificate
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kcp-tls
  namespace: platform
  labels:
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: sovereign-cloud-platform
spec:
  secretName: kcp-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - kcp.demo.example.com
  # Renew 30 days before expiry (certificates are valid for 90 days)
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256

---
