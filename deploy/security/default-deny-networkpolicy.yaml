# Default Deny NetworkPolicy (Standard Kubernetes)
#
# This is a defense-in-depth layer using standard Kubernetes NetworkPolicy API.
# The primary tenant isolation mechanism is Kube-OVN Vpc/Subnet isolation
# (see deploy/kube-ovn/tenant-vpc-template.yaml), which provides dataplane-level
# separation. This NetworkPolicy adds an additional layer within each Vpc.
#
# Apply to each tenant namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: TENANT_NAMESPACE       # Replace with actual tenant namespace
spec:
  podSelector: {}                   # Applies to all pods
  policyTypes:
    - Ingress
    - Egress
  # No ingress/egress rules = deny all
---
# Allow DNS egress (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: TENANT_NAMESPACE       # Replace with actual tenant namespace
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
