# MetalLB configuration for bare metal LoadBalancer services.
# Kube-OVN does not include built-in L2/BGP load balancer advertisement.
# MetalLB provides LoadBalancer service IP allocation on bare metal.
#
# Install MetalLB:
#   helm repo add metallb https://metallb.github.io/metallb
#   helm install metallb metallb/metallb \
#     --namespace metallb-system \
#     --create-namespace
#
# Then apply this configuration.

# L2 advertisement — MetalLB responds to ARP requests for service IPs
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: default
  namespace: metallb-system
---
# IP pool for LoadBalancer services.
# Adjust the address range to match your provider's allocatable public IP range.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: public-pool
  namespace: metallb-system
spec:
  addresses:
    - 203.0.113.128/25
