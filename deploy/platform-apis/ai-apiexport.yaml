# ============================================================================
# APIExport: ai
# ============================================================================
# Exposes the AI/ML API group resources to tenants via KCP's API export
# mechanism. Tenants can bind to this APIExport to gain access to Notebook
# and GPUJob resources in their workspaces.
#
# The APIExport references the latest versions of the APIResourceSchemas
# for all AI-related resources. When schemas are updated, tenants
# automatically receive the new API definitions.
# ============================================================================
apiVersion: apis.kcp.io/v1alpha1
kind: APIExport
metadata:
  # Name of the APIExport, used by tenants when creating APIBindings
  name: ai
spec:
  # List of APIResourceSchema names that are part of this export.
  # These schemas define the resource types available to tenants
  # who bind to this APIExport.
  latestResourceSchemas:
    # Notebook: managed Jupyter notebook environments
    - notebooks.ai.cloud.example
    # GPUJob: batch GPU compute jobs
    - gpujobs.ai.cloud.example
