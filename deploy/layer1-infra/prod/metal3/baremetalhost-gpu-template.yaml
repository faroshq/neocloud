# BareMetalHost template for GPU worker nodes.
# Duplicate this file for each physical server equipped with GPUs that
# will run workload cluster GPU workloads. Replace all <PLACEHOLDER>
# values before applying.
---
apiVersion: v1
kind: Secret
metadata:
  # Must match spec.bmc.credentialsName in the BareMetalHost below.
  name: gpu-worker-<INDEX>-bmc-credentials
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: metal3
    app.kubernetes.io/managed-by: sovereign-cloud-ref
    role: workload
    feature: gpu
type: Opaque
stringData:
  # IPMI / Redfish credentials for the baseboard management controller.
  username: <BMC_USERNAME>
  password: <BMC_PASSWORD>

---
apiVersion: metal3.io/v1alpha1
kind: BareMetalHost
metadata:
  name: gpu-worker-<INDEX>
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: metal3
    app.kubernetes.io/managed-by: sovereign-cloud-ref
    # Used by hostSelector in the workload cluster Machine templates
    # to schedule GPU workloads onto GPU-capable hardware.
    role: workload
    feature: gpu
spec:
  # Replace with the actual MAC address of the provisioning NIC.
  bootMACAddress: "AA:BB:CC:DD:EE:<INDEX_HEX>"

  # BMC connection details. Replace <INDEX> with the host ordinal
  # so the address maps to the correct IPMI endpoint.
  bmc:
    address: "ipmi://172.16.10.<INDEX>:623"
    credentialsName: gpu-worker-<INDEX>-bmc-credentials

  # Ensure Ironic writes the OS to the correct disk.
  rootDeviceHints:
    deviceName: /dev/sda

  # Allow the host to be provisioned automatically once matched.
  online: true

  # Disable external inspection if Ironic fast-track is enabled.
  automatedCleaningMode: metadata
