# GPU worker MachineDeployment for the workload cluster.
# These nodes are equipped with GPUs and are labelled so that GPU-aware
# schedulers and device plugins can target them.

# --------------------------------------------------------------------------
# MachineDeployment — manages the desired number of GPU worker Machines.
# --------------------------------------------------------------------------
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: workload-cluster-gpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    app.kubernetes.io/managed-by: cluster-api
    cluster.x-k8s.io/cluster-name: workload-cluster
    nodepool: gpu
spec:
  clusterName: workload-cluster
  replicas: 2

  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: workload-cluster
      nodepool: gpu

  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: workload-cluster
        nodepool: gpu
    spec:
      clusterName: workload-cluster
      version: v1.35.3

      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: workload-cluster-gpu-workers

      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: Metal3MachineTemplate
        name: workload-cluster-gpu-workers

---
# --------------------------------------------------------------------------
# Metal3MachineTemplate — bare-metal machine spec for GPU workers.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-gpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    nodepool: gpu
spec:
  template:
    spec:
      # Only provision onto BareMetalHosts that carry GPU hardware.
      hostSelector:
        matchLabels:
          feature: gpu

      image:
        # TODO: Update URL to match your Ironic httpd image path.
        url: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img"
        checksum: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img.sha512sum"
        checksumType: sha512
        format: qcow2

---
# --------------------------------------------------------------------------
# KubeadmConfigTemplate — bootstrap configuration for GPU worker nodes.
# --------------------------------------------------------------------------
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: workload-cluster-gpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    nodepool: gpu
spec:
  template:
    spec:
      users:
        - name: neo
          sudo: ALL=(ALL) NOPASSWD:ALL
          # TODO: Replace with a strong password hash (openssl passwd -6)
          passwd: "$6$neo$4g3zp5Aa8lEJGv3Mv1WRZmweP1eWZSPhITrr38FZc19UKn3l9alJ3eGLGxwdroMGBL/ZW17aZGJhFN.fAh52l1"
          lockPassword: false
          shell: /bin/bash

      preKubeadmCommands:
        - echo 'neo:neo' | chpasswd
        # Load required kernel modules for networking
        - modprobe br_netfilter && modprobe overlay
        - sysctl -w net.bridge.bridge-nf-call-iptables=1
        - sysctl -w net.ipv4.ip_forward=1
        # Install containerd (not included in Ubuntu cloud image)
        - apt-get update && apt-get install -y apt-transport-https ca-certificates curl containerd
        - mkdir -p /etc/containerd
        - containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' > /etc/containerd/config.toml
        - systemctl restart containerd && systemctl enable containerd
        - "echo 'runtime-endpoint: unix:///run/containerd/containerd.sock' > /etc/crictl.yaml"
        # Install kubeadm, kubelet, kubectl
        - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
        - apt-get update && apt-get install -y kubelet kubeadm kubectl jq && apt-mark hold kubelet kubeadm kubectl

      postKubeadmCommands:
        # Label node with BMH UUID from ConfigDrive metadata so CAPM3 can match it
        - |
          METAL3_UUID=$(jq -r '.ds.meta_data.uuid // empty' /run/cloud-init/instance-data.json 2>/dev/null || true)
          if [ -n "${METAL3_UUID}" ]; then
            kubectl --kubeconfig /etc/kubernetes/kubelet.conf label node $(hostname) metal3.io/uuid=${METAL3_UUID} --overwrite || true
          fi

      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: ""
            # Labels applied to the node so workloads can select GPU hosts.
            node-labels: "gpu=true,nodepool=gpu"
