# Management cluster definition using Cluster API with the Metal3 provider.
# This cluster runs 3 control-plane replicas for high availability and hosts
# the platform management components (KCP, observability, etc.).

# --------------------------------------------------------------------------
# Cluster
# --------------------------------------------------------------------------
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: management-cluster
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    app.kubernetes.io/managed-by: cluster-api
    cluster-role: management
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.244.0.0/16"
    services:
      cidrBlocks:
        - "10.96.0.0/12"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: management-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: management-cluster

---
# --------------------------------------------------------------------------
# Metal3Cluster — infrastructure backing for the CAPI Cluster.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: management-cluster
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  # Virtual IP fronting the three control-plane nodes, typically
  # managed by keepalived or kube-vip.
  controlPlaneEndpoint:
    host: "172.16.30.10"
    port: 6443
  noCloudProvider: true

---
# --------------------------------------------------------------------------
# KubeadmControlPlane — defines the control-plane topology and config.
# --------------------------------------------------------------------------
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: management-cluster-control-plane
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  # Three replicas for etcd quorum and HA.
  replicas: 3

  version: v1.30.4

  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: management-cluster-control-plane

  kubeadmConfigSpec:
    # Commands executed before kubeadm init/join on each node.
    preKubeadmCommands:
      - hostnamectl set-hostname "{{ ds.meta_data.hostname }}"
      - echo "{{ ds.meta_data.hostname }}" > /etc/hostname
      # Ensure the kubelet can resolve the node name.
      - echo "127.0.1.1 {{ ds.meta_data.hostname }}" >> /etc/hosts
      # Load required kernel modules for networking and storage.
      - modprobe br_netfilter
      - modprobe overlay
      - sysctl -w net.bridge.bridge-nf-call-iptables=1
      - sysctl -w net.ipv4.ip_forward=1

    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
          # Protect management nodes from tenant workloads.
          register-with-taints: "node-role.kubernetes.io/control-plane=:NoSchedule"
        name: "{{ ds.meta_data.hostname }}"

    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
        name: "{{ ds.meta_data.hostname }}"

    # Harden the cluster with audit logging and encryption at rest.
    clusterConfiguration:
      apiServer:
        extraArgs:
          audit-log-path: /var/log/kubernetes/audit.log
          audit-log-maxage: "30"
          audit-log-maxbackup: "10"
          audit-log-maxsize: "100"
      etcd:
        local:
          dataDir: /var/lib/etcd

---
# --------------------------------------------------------------------------
# Metal3MachineTemplate — bare-metal machine spec for control-plane nodes.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: management-cluster-control-plane
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  template:
    spec:
      # Select only BareMetalHosts labelled for management duties.
      hostSelector:
        matchLabels:
          role: management

      image:
        # Ubuntu Server cloud image served by the Ironic image server.
        url: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img"
        checksum: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img.md5sum"
        checksumType: md5
        format: raw

      dataTemplate:
        name: management-cluster-control-plane-metadata
