# Management cluster definition using Cluster API with the Metal3 provider.
# This cluster runs 3 control-plane replicas for high availability and hosts
# the platform management components (KCP, observability, etc.).

# --------------------------------------------------------------------------
# Cluster
# --------------------------------------------------------------------------
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: management-cluster
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    app.kubernetes.io/managed-by: cluster-api
    cluster-role: management
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.244.0.0/16"
    services:
      cidrBlocks:
        - "10.96.0.0/12"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: management-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: management-cluster

---
# --------------------------------------------------------------------------
# Metal3Cluster — infrastructure backing for the CAPI Cluster.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: management-cluster
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  # Virtual IP fronting the three control-plane nodes, typically
  # managed by keepalived or kube-vip.
  # TODO: Replace with your management cluster VIP.
  controlPlaneEndpoint:
    host: "172.16.30.10"
    port: 6443
  noCloudProvider: true

---
# --------------------------------------------------------------------------
# KubeadmControlPlane — defines the control-plane topology and config.
# --------------------------------------------------------------------------
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: management-cluster-control-plane
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  # Three replicas for etcd quorum and HA.
  replicas: 3

  version: v1.35.3

  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: management-cluster-control-plane

  kubeadmConfigSpec:
    users:
      - name: neo
        sudo: ALL=(ALL) NOPASSWD:ALL
        # TODO: Replace with a strong password hash (openssl passwd -6)
        passwd: "$6$neo$4g3zp5Aa8lEJGv3Mv1WRZmweP1eWZSPhITrr38FZc19UKn3l9alJ3eGLGxwdroMGBL/ZW17aZGJhFN.fAh52l1"
        lockPassword: false
        shell: /bin/bash

    preKubeadmCommands:
      - echo 'neo:neo' | chpasswd
      # Load required kernel modules for networking
      - modprobe br_netfilter && modprobe overlay
      - sysctl -w net.bridge.bridge-nf-call-iptables=1
      - sysctl -w net.ipv4.ip_forward=1
      # Install containerd (not included in Ubuntu cloud image)
      - apt-get update && apt-get install -y apt-transport-https ca-certificates curl containerd
      - mkdir -p /etc/containerd
      - containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' > /etc/containerd/config.toml
      - systemctl restart containerd && systemctl enable containerd
      - "echo 'runtime-endpoint: unix:///run/containerd/containerd.sock' > /etc/crictl.yaml"
      # Install kubeadm, kubelet, kubectl
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
      - apt-get update && apt-get install -y kubelet kubeadm kubectl jq && apt-mark hold kubelet kubeadm kubectl

    postKubeadmCommands:
      # Label node with BMH UUID from ConfigDrive metadata so CAPM3 can match it
      - |
        METAL3_UUID=$(jq -r '.ds.meta_data.uuid // empty' /run/cloud-init/instance-data.json 2>/dev/null || true)
        if [ -n "${METAL3_UUID}" ]; then
          kubectl --kubeconfig /etc/kubernetes/admin.conf label node $(hostname) metal3.io/uuid=${METAL3_UUID} --overwrite || true
        fi

    initConfiguration:
      localAPIEndpoint:
        # TODO: Replace with management cluster VIP (must match controlPlaneEndpoint above)
        advertiseAddress: "172.16.30.10"
        bindPort: 6443
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
          # Protect management nodes from tenant workloads.
          register-with-taints: "node-role.kubernetes.io/control-plane=:NoSchedule"

    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""

    # Harden the cluster with audit logging.
    clusterConfiguration:
      apiServer:
        extraArgs:
          audit-log-path: /var/log/kubernetes/audit.log
          audit-log-maxage: "30"
          audit-log-maxbackup: "10"
          audit-log-maxsize: "100"
      etcd:
        local:
          dataDir: /var/lib/etcd

---
# --------------------------------------------------------------------------
# Metal3MachineTemplate — bare-metal machine spec for control-plane nodes.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: management-cluster-control-plane
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    cluster-role: management
spec:
  template:
    spec:
      # Select only BareMetalHosts labelled for management duties.
      hostSelector:
        matchLabels:
          role: management

      image:
        # Ubuntu Server cloud image served by the Ironic image server.
        # TODO: Update URL to match your Ironic httpd image path.
        url: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img"
        checksum: "http://172.16.20.10:6180/images/ubuntu-24.04-server-cloudimg-amd64.img.sha512sum"
        checksumType: sha512
        format: qcow2
