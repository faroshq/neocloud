# =============================================================================
# Kube-OVN Helm Values — Workload Cluster
# =============================================================================
#
# Kube-OVN serves as the sole CNI for the platform. It handles:
#   1. Default cluster pod networking (platform system pods)
#   2. Tenant virtual networks via Vpc/Subnet CRDs (KubeVirt VMs)
#
# Prerequisites:
#   Control plane nodes MUST be labeled before install:
#     kubectl label node <cp-node> kube-ovn/role=master
#
# Install with:
#   helm repo add kube-ovn https://kubeovn.github.io/kube-ovn
#   helm install kube-ovn kube-ovn/kube-ovn \
#     --namespace kube-system \
#     --kubeconfig <workload-cluster-kubeconfig> \
#     --values deploy/layer1-infra/prod/kube-ovn/values.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# Replica count for OVN central components (ovn-central)
# -----------------------------------------------------------------------------
# For HA, set to 3 (one per control plane node).
replicaCount: 3

# -----------------------------------------------------------------------------
# Network interface
# -----------------------------------------------------------------------------
# IFACE: The host network interface Kube-OVN uses for tunnel traffic.
# This should be the primary interface connected to the cluster network.
# TODO: Replace with the actual interface name on your bare metal nodes.
IFACE: "eth0"

# -----------------------------------------------------------------------------
# Pod and Service CIDRs
# -----------------------------------------------------------------------------
# POD_CIDR: Must match the cluster's pod CIDR in workload-cluster.yaml
POD_CIDR: "10.245.0.0/16"

# SVC_CIDR: Must match the cluster's service CIDR in workload-cluster.yaml
SVC_CIDR: "10.97.0.0/16"

# -----------------------------------------------------------------------------
# Load balancing
# -----------------------------------------------------------------------------
ENABLE_LB: true

# -----------------------------------------------------------------------------
# Network Policy support
# -----------------------------------------------------------------------------
ENABLE_NP: true
