# Lima VM: CPU workload node
#
# Runs k3s agent joining the mgmt node.
# Usage: managed by deploy/layer1-infra/dev/scripts/up.sh
#
# Requires NEO_K3S_TOKEN and NEO_MGMT_IP environment variables
# (set by up.sh before creating this VM).

arch: x86_64
vmType: qemu

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: x86_64

cpus: 2
memory: 4GiB
disk: 30GiB

mounts: []

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail

      apt-get update
      apt-get install -y curl socat jq

      echo "Base packages installed. k3s agent will be joined by up.sh after VM start."
