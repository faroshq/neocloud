# CPU worker MachineDeployment for dev
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
spec:
  clusterName: workload-cluster
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: workload-cluster
      pool: cpu
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: workload-cluster
        pool: cpu
    spec:
      clusterName: workload-cluster
      version: v1.35.3
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: workload-cluster-cpu-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: Metal3MachineTemplate
        name: workload-cluster-cpu-workers
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
spec:
  template:
    spec:
      hostSelector:
        matchLabels:
          feature: cpu
      image:
        url: "http://172.16.20.10:6180/images/flatcar_production_qemu_image.img"
        checksum: "http://172.16.20.10:6180/images/flatcar_production_qemu_image.img.DIGESTS"
        checksumType: sha512
        format: qcow2
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
spec:
  template:
    spec:
      format: ignition
      ignition:
        containerLinuxConfig:
          additionalConfig: |
            storage:
              files: []
      preKubeadmCommands:
        - hostnamectl set-hostname "{{ ds.meta_data.hostname }}"
        - modprobe br_netfilter && modprobe overlay
        - sysctl -w net.bridge.bridge-nf-call-iptables=1
        - sysctl -w net.ipv4.ip_forward=1
        - mkdir -p /opt/bin
        - for bin in kubeadm kubelet kubectl; do curl -fL "https://dl.k8s.io/release/v1.35.3/bin/linux/amd64/${bin}" -o "/opt/bin/${bin}" && chmod +x "/opt/bin/${bin}"; done
        - curl -fL "https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.35.0/crictl-v1.35.0-linux-amd64.tar.gz" | tar -C /opt/bin -xz
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: ""
            node-labels: "nodepool=cpu"
          name: "{{ ds.meta_data.hostname }}"
