# Dev workload cluster — same structure as prod but sized for libvirt VMs.
# Applied after BareMetalHosts reach "Available" state.
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.245.0.0/16"
    services:
      cidrBlocks:
        - "10.97.0.0/16"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: workload-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: workload-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  controlPlaneEndpoint:
    host: "172.16.30.20"
    port: 6443
  noCloudProvider: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  # Single control plane for dev (scale to 3 for prod)
  replicas: 1
  version: v1.35.3
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: workload-cluster-control-plane
  kubeadmConfigSpec:
    users:
      - name: neo
        sudo: ALL=(ALL) NOPASSWD:ALL
        passwd: "$6$neo$4g3zp5Aa8lEJGv3Mv1WRZmweP1eWZSPhITrr38FZc19UKn3l9alJ3eGLGxwdroMGBL/ZW17aZGJhFN.fAh52l1"
        lockPassword: false
        shell: /bin/bash
    preKubeadmCommands:
      - echo 'neo:neo' | chpasswd
      # Bring up all interfaces with DHCP (needed for internet via NAT NIC)
      - |
        cat > /etc/netplan/99-all-dhcp.yaml << 'EOF'
        network:
          version: 2
          ethernets:
            allnics:
              match:
                name: "en*"
              dhcp4: true
        EOF
      - chmod 600 /etc/netplan/99-all-dhcp.yaml
      - netplan apply || true
      - sleep 5
      # Assign the control plane endpoint IP on the baremetal NIC
      - ip addr add 172.16.30.20/24 dev ens4 || true
      - ip link set ens4 up || true
      - modprobe br_netfilter && modprobe overlay
      - sysctl -w net.bridge.bridge-nf-call-iptables=1
      - sysctl -w net.ipv4.ip_forward=1
      - apt-get update && apt-get install -y apt-transport-https ca-certificates curl containerd
      # Configure containerd with systemd cgroup driver
      - mkdir -p /etc/containerd
      - containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' > /etc/containerd/config.toml
      - systemctl restart containerd && systemctl enable containerd
      - "echo 'runtime-endpoint: unix:///run/containerd/containerd.sock' > /etc/crictl.yaml"
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
      - apt-get update && apt-get install -y kubelet kubeadm kubectl jq && apt-mark hold kubelet kubeadm kubectl
    postKubeadmCommands:
      # Label node with BMH UUID from ConfigDrive metadata so CAPM3 can match it
      - |
        METAL3_UUID=$(jq -r '.ds.meta_data.uuid // empty' /run/cloud-init/instance-data.json 2>/dev/null || true)
        if [ -n "${METAL3_UUID}" ]; then
          kubectl --kubeconfig /etc/kubernetes/admin.conf label node $(hostname) metal3.io/uuid=${METAL3_UUID} --overwrite || true
        fi
    initConfiguration:
      localAPIEndpoint:
        advertiseAddress: "172.16.30.20"
        bindPort: 6443
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  template:
    spec:
      hostSelector:
        matchLabels:
          role: control-plane
      image:
        url: "http://172.16.20.10:6180/images/ubuntu-worker.img"
        checksum: "http://172.16.20.10:6180/images/ubuntu-worker.img.sha512sum"
        checksumType: sha512
        format: qcow2
