# Dev workload cluster — same structure as prod but sized for libvirt VMs.
# Applied after BareMetalHosts reach "Available" state.
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.245.0.0/16"
    services:
      cidrBlocks:
        - "10.97.0.0/16"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: KubeadmControlPlane
    name: workload-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
    kind: Metal3Cluster
    name: workload-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  controlPlaneEndpoint:
    host: "172.16.30.20"
    port: 6443
  noCloudProvider: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  # Single control plane for dev (scale to 3 for prod)
  replicas: 1
  version: v1.35.3
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: Metal3MachineTemplate
      name: workload-cluster-control-plane
  kubeadmConfigSpec:
    users:
      - name: neo
        sudo: ALL=(ALL) NOPASSWD:ALL
        passwd: "$6$rounds=4096$neo$eSY.fMgBbABKZr0x1BgDyOmMJbI3IKVHy3kBOJCmVFG7wJnyWXJFJyN/BLY.fDEviWJGMh/7R0Bh/jnGBLOL1"
        lockPassword: false
        shell: /bin/bash
    preKubeadmCommands:
      - modprobe br_netfilter && modprobe overlay
      - sysctl -w net.bridge.bridge-nf-call-iptables=1
      - sysctl -w net.ipv4.ip_forward=1
      - apt-get update && apt-get install -y apt-transport-https ca-certificates curl
      - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
      - apt-get update && apt-get install -y kubelet kubeadm kubectl && apt-mark hold kubelet kubeadm kubectl
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  template:
    spec:
      hostSelector:
        matchLabels:
          feature: cpu
      image:
        url: "http://172.16.20.10:6180/images/ubuntu-worker.img"
        checksum: "http://172.16.20.10:6180/images/ubuntu-worker.img.sha512sum"
        checksumType: sha512
        format: qcow2
