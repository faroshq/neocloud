# Dev workload cluster — same structure as prod but sized for libvirt VMs.
# Applied after BareMetalHosts reach "Available" state.
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - "10.245.0.0/16"
    services:
      cidrBlocks:
        - "10.97.0.0/16"
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: workload-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: Metal3Cluster
    name: workload-cluster
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3Cluster
metadata:
  name: workload-cluster
  namespace: metal3
spec:
  controlPlaneEndpoint:
    host: "172.16.30.20"
    port: 6443
  noCloudProvider: true
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  # Single control plane for dev (scale to 3 for prod)
  replicas: 1
  version: v1.35.3
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: workload-cluster-control-plane
  kubeadmConfigSpec:
    format: ignition
    ignition:
      containerLinuxConfig:
        additionalConfig: |
          storage:
            files: []
    preKubeadmCommands:
      - hostnamectl set-hostname "{{ ds.meta_data.hostname }}"
      - modprobe br_netfilter && modprobe overlay
      - sysctl -w net.bridge.bridge-nf-call-iptables=1
      - sysctl -w net.ipv4.ip_forward=1
      # Flatcar has no package manager — download k8s binaries
      - mkdir -p /opt/bin
      - for bin in kubeadm kubelet kubectl; do curl -fL "https://dl.k8s.io/release/v1.35.3/bin/linux/amd64/${bin}" -o "/opt/bin/${bin}" && chmod +x "/opt/bin/${bin}"; done
      - curl -fL "https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.35.0/crictl-v1.35.0-linux-amd64.tar.gz" | tar -C /opt/bin -xz
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
        name: "{{ ds.meta_data.hostname }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          cloud-provider: ""
        name: "{{ ds.meta_data.hostname }}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-control-plane
  namespace: metal3
spec:
  template:
    spec:
      hostSelector:
        matchLabels:
          feature: cpu
      image:
        url: "http://172.16.20.10:6180/images/flatcar_production_qemu_image.img"
        checksum: "http://172.16.20.10:6180/images/flatcar_production_qemu_image.img.DIGESTS"
        checksumType: sha512
        format: qcow2
