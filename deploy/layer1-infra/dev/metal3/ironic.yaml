# Ironic deployment for dev — runs as containers on the mgmt k3s node.
# Provides PXE boot (dnsmasq) + HTTP image serving + Ironic API.
#
# In production, Ironic runs the same way but with real network interfaces.
---
apiVersion: v1
kind: Namespace
metadata:
  name: baremetal-operator-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ironic-config
  namespace: baremetal-operator-system
data:
  # Provisioning network — mgmt VM's static IP on the mcast provisioning segment
  IRONIC_IP: "172.16.20.10"
  PROVISIONING_INTERFACE: "enp2s0"
  DHCP_RANGE: "172.16.20.100,172.16.20.200"
  DEPLOY_KERNEL_URL: "http://172.16.20.10:6180/images/ironic-python-agent.kernel"
  DEPLOY_RAMDISK_URL: "http://172.16.20.10:6180/images/ironic-python-agent.initramfs"
  IRONIC_KERNEL_PARAMS: "console=ttyS0"
  IRONIC_INSPECTOR_VLAN_INTERFACES: "all"
  IRONIC_FAST_TRACK: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ironic-bmo-configmap
  namespace: baremetal-operator-system
data:
  registrationMode: "annotation"
