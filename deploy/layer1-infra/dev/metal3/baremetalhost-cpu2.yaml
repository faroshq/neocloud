# BareMetalHost for dev CPU worker 2 — points to sushy-tools Redfish
---
apiVersion: v1
kind: Secret
metadata:
  name: worker-cpu2-bmc-credentials
  namespace: metal3
type: Opaque
stringData:
  username: admin
  password: password
---
apiVersion: metal3.io/v1alpha1
kind: BareMetalHost
metadata:
  name: worker-cpu2
  namespace: metal3
  labels:
    role: worker
    feature: cpu
spec:
  bootMACAddress: "52:54:00:aa:bb:03"
  bmc:
    # sushy-tools Redfish endpoint (runs on host provisioning bridge IP)
    address: "redfish+http://172.16.20.1:8000/redfish/v1/Systems/neo-worker-cpu2"
    credentialsName: worker-cpu2-bmc-credentials
  rootDeviceHints:
    deviceName: /dev/vda
  bootMode: legacy
  online: true
  automatedCleaningMode: disabled
