# Dev Ironic overlay — pulls from BMO repo, customizes for our provisioning network.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/metal3-io/baremetal-operator/ironic-deployment/default?ref=v0.12.3

# Patch the upstream configmap env file with our network values.
# Using configMapGenerator with behavior:merge doesn't work with remote bases
# (creates a separate configmap instead of merging), so we use a strategic merge patch.
patches:
  - target:
      kind: ConfigMap
      name: ironic-bmo-configmap
      namespace: baremetal-operator-system
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ironic-bmo-configmap
        namespace: baremetal-operator-system
      data:
        IRONIC_IP: "172.16.20.10"
        IRONIC_BASE_URL: "http://172.16.20.10:6385"
        PROVISIONING_IP: "172.16.20.10"
        PROVISIONING_INTERFACE: "ens4"
        DHCP_RANGE: "172.16.20.100,172.16.20.200"
        DEPLOY_KERNEL_URL: "http://172.16.20.10:6180/images/ironic-python-agent.kernel"
        DEPLOY_RAMDISK_URL: "http://172.16.20.10:6180/images/ironic-python-agent.initramfs"
        IRONIC_ENDPOINT: "http://172.16.20.10:6385/v1/"
        IRONIC_KERNEL_PARAMS: "console=ttyS0"
        IRONIC_FAST_TRACK: "true"
  # Patch the BMO controller's configmap (referenced as envFrom in BMO deployment)
  - target:
      kind: ConfigMap
      name: ironic
      namespace: baremetal-operator-system
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ironic
        namespace: baremetal-operator-system
      data:
        IRONIC_ENDPOINT: "http://172.16.20.10:6385/v1/"
        PROVISIONING_INTERFACE: "ens4"
        DHCP_RANGE: "172.16.20.100,172.16.20.200"
        CACHEURL: "http://172.16.20.10:6180/images"
