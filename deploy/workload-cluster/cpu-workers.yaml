# CPU worker MachineDeployment for the workload cluster.
# These nodes run general-purpose CPU workloads without specialised
# accelerator hardware.

# --------------------------------------------------------------------------
# MachineDeployment — manages the desired number of CPU worker Machines.
# --------------------------------------------------------------------------
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    app.kubernetes.io/managed-by: cluster-api
    cluster.x-k8s.io/cluster-name: workload-cluster
    nodepool: cpu
spec:
  clusterName: workload-cluster
  replicas: 3

  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: workload-cluster
      nodepool: cpu

  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: workload-cluster
        nodepool: cpu
    spec:
      clusterName: workload-cluster
      version: v1.30.4

      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: workload-cluster-cpu-workers

      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: Metal3MachineTemplate
        name: workload-cluster-cpu-workers

---
# --------------------------------------------------------------------------
# Metal3MachineTemplate — bare-metal machine spec for CPU workers.
# --------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    nodepool: cpu
spec:
  template:
    spec:
      # Only provision onto BareMetalHosts labelled as CPU-only workers.
      hostSelector:
        matchLabels:
          feature: cpu

      image:
        url: "http://172.16.20.10:6180/images/flatcar_production_metal_image.bin.bz2"
        checksum: "http://172.16.20.10:6180/images/flatcar_production_metal_image.bin.bz2.md5sum"
        checksumType: md5
        format: raw

      dataTemplate:
        name: workload-cluster-cpu-workers-metadata

---
# --------------------------------------------------------------------------
# KubeadmConfigTemplate — bootstrap configuration for CPU worker nodes.
# --------------------------------------------------------------------------
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: workload-cluster-cpu-workers
  namespace: metal3
  labels:
    app.kubernetes.io/part-of: sovereign-cloud-ref
    nodepool: cpu
spec:
  template:
    spec:
      preKubeadmCommands:
        - hostnamectl set-hostname "{{ ds.meta_data.hostname }}"
        - echo "{{ ds.meta_data.hostname }}" > /etc/hostname
        - echo "127.0.1.1 {{ ds.meta_data.hostname }}" >> /etc/hosts
        - modprobe br_netfilter
        - modprobe overlay
        - sysctl -w net.bridge.bridge-nf-call-iptables=1
        - sysctl -w net.ipv4.ip_forward=1

      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: ""
            # Label applied to the node for CPU worker pool identification.
            node-labels: "nodepool=cpu"
          name: "{{ ds.meta_data.hostname }}"
