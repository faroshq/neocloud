# Tenant Network Isolation Policy (Template)
#
# This policy is applied by the onboarding controller to each tenant namespace.
# It enforces:
#   - Allow traffic within the same tenant namespace
#   - Allow traffic from platform-system (operators, ingress)
#   - Allow DNS resolution (kube-system/kube-dns)
#   - Allow egress to the internet
#   - DENY all cross-tenant traffic
#
# Replace TENANT_NAMESPACE with the actual tenant namespace name.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tenant-isolation
  namespace: TENANT_NAMESPACE       # Replace with actual tenant namespace
spec:
  description: "Default isolation policy for tenant namespace"
  endpointSelector: {}              # Applies to all pods in this namespace
  ingress:
    # Allow traffic from pods in the same namespace
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: TENANT_NAMESPACE
    # Allow traffic from platform operators and ingress gateway
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: platform-system
  egress:
    # Allow traffic to pods in the same namespace
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: TENANT_NAMESPACE
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow egress to the internet (configurable per tenant)
    - toEntities:
        - world
    # Allow access to cluster services (Service CIDR)
    - toCIDR:
        - 10.97.0.0/16
