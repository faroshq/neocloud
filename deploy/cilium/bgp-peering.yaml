# =============================================================================
# CiliumBGPClusterConfig - Rack-level BGP Peering
# =============================================================================
#
# This resource configures BGP peering between Cilium nodes in rack-1 and
# the Top-of-Rack (ToR) switch. Each selected node runs a BGP speaker that:
#
#   1. Establishes a BGP session with the ToR switch
#   2. Advertises the node's pod CIDR to the ToR
#   3. Optionally advertises Service LoadBalancer IPs
#
# Network topology assumed:
#
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  ToR Switch  в”Ӯ  ASN 65000
#   в”Ӯ 172.16.30.1  в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#          в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ   Rack-1     в”Ӯ
#   в”Ӯ  Nodes       в”Ӯ  ASN 65001
#   в”Ӯ  (Cilium)    в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# Each rack can have its own CiliumBGPClusterConfig with a different ASN
# and ToR switch address. This supports multi-rack deployments where each
# rack peers with its own ToR.
#
# Prerequisites:
#   - Cilium installed with bgpControlPlane.enabled: true
#   - Nodes in rack-1 labeled with topology.kubernetes.io/rack: rack-1
#   - ToR switch configured to accept BGP peering from ASN 65001
#
# Apply with:
#   kubectl apply -f deploy/cilium/bgp-peering.yaml
#
# Verify BGP sessions:
#   cilium bgp peers
#   cilium bgp routes
# =============================================================================

apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: rack-1-bgp-peering
spec:
  # ---------------------------------------------------------------------------
  # Node selector
  # ---------------------------------------------------------------------------
  # nodeSelector: Only nodes with this label will run BGP speakers with this
  # configuration. Use topology labels to scope peering to specific racks.
  #
  # Label your nodes:
  #   kubectl label node <node-name> topology.kubernetes.io/rack=rack-1
  nodeSelector:
    matchLabels:
      topology.kubernetes.io/rack: "rack-1"

  # ---------------------------------------------------------------------------
  # BGP instances
  # ---------------------------------------------------------------------------
  # Each instance defines the local ASN and a set of peers. A node can
  # participate in multiple BGP instances if needed (e.g., peering with
  # both a ToR switch and a route reflector).
  bgpInstances:
    - name: rack-1-tor
      # localASN: The AS number announced by Cilium nodes in this rack.
      # Use a private ASN (64512-65534) for internal BGP deployments.
      # Each rack can use the same or different ASN depending on your
      # BGP design (iBGP vs eBGP).
      localASN: 65001

      # peers: List of BGP neighbors to peer with.
      peers:
        - name: tor-switch
          # peerAddress: IP address of the ToR switch's BGP speaker.
          # This must be reachable from the node's network interface.
          peerAddress: "172.16.30.1"

          # peerASN: The AS number of the ToR switch.
          # If peerASN == localASN, this is an iBGP session.
          # If peerASN != localASN, this is an eBGP session (shown here).
          peerASN: 65000

          # peerConfigRef: Optional reference to a CiliumBGPPeerConfig
          # resource for advanced settings (timers, authentication, etc.).
          # peerConfigRef:
          #   name: rack-1-peer-config
